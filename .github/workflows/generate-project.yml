name: Generate Project Files

on:
  workflow_dispatch:

permissions:
  contents: write
  workflows: write   # Required to push workflow files (.github/workflows/*.yml)

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create folder structure and write files
        shell: bash
        run: |
          # Create root directories
          mkdir -p .github/workflows
          mkdir -p AnikoTvProvider/src/main/kotlin/com/anikotv

          # -------------------------------
          # Root configuration files
          # -------------------------------

          cat << 'EOF' > settings.gradle.kts
          rootProject.name = "CloudstreamPlugins"

          val disabled = listOf<String>()

          File(rootDir, ".").eachDir { dir ->
              if (!disabled.contains(dir.name) && File(dir, "build.gradle.kts").exists()) {
                  include(dir.name)
              }
          }

          fun File.eachDir(block: (File) -> Unit) {
              listFiles()?.filter { it.isDirectory }?.forEach { block(it) }
          }
          EOF

          cat << 'EOF' > build.gradle.kts
          import com.android.build.api.dsl.LibraryExtension
          import com.lagradost.cloudstream3.gradle.CloudstreamExtension
          import org.jetbrains.kotlin.gradle.dsl.JvmTarget
          import org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile

          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:9.1.1")
                  classpath("com.github.recloudstream.gradle:gradle:81b1d424d")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.4.0")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }

          subprojects {
              apply(plugin = "com.android.library")
              apply(plugin = "com.lagradost.cloudstream3.gradle")

              cloudstream {
                  setRepo(System.getenv("GITHUB_REPOSITORY") ?: "yet66/cloudstream-extensions-anikotv")
                  authors = listOf("yet66")
              }

              android {
                  namespace = "com.anikotv"
                  compileSdk = 36
                  defaultConfig {
                      minSdk = 21
                  }
                  compileOptions {
                      sourceCompatibility = JavaVersion.VERSION_1_8
                      targetCompatibility = JavaVersion.VERSION_1_8
                  }
                  tasks.withType<KotlinJvmCompile> {
                      compilerOptions {
                          jvmTarget.set(JvmTarget.JVM_1_8)
                          freeCompilerArgs.addAll(
                              "-Xno-call-assertions",
                              "-Xno-param-assertions",
                              "-Xno-receiver-assertions",
                          )
                      }
                  }
              }

              dependencies {
                  val implementation by configurations
                  val cloudstream by configurations

                  cloudstream("com.lagradost:cloudstream3:pre-release")
                  implementation(kotlin("stdlib"))
                  implementation("com.github.Blatzar:NiceHttp:0.4.18")
                  implementation("org.jsoup:jsoup:1.22.2")
                  implementation("androidx.annotation:annotation:1.10.0")
                  implementation("com.fasterxml.jackson.module:jackson-module-kotlin:2.13.1")
                  implementation("com.fasterxml.jackson.core:jackson-databind:2.13.1")
                  implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2")
                  implementation("com.google.code.gson:gson:2.14.0")
              }
          }

          tasks.register("clean") {
              delete(rootProject.layout.buildDirectory)
          }
          EOF

          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m
          org.gradle.parallel=true
          kotlin.code.style=official
          android.useAndroidX=true
          EOF

          cat << 'EOF' > .gitignore
          *.iml
          .gradle
          /local.properties
          /.idea
          .DS_Store
          /build
          /captures
          .externalNativeBuild
          .cxx
          local.properties
          *.apk
          *.cs3
          EOF

          cat << 'EOF' > repo.json
          {
            "name": "cloudstream-extensions-anikotv",
            "description": "CloudStream 3 AnikoTV plugin by yet66",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/yet66/cloudstream-extensions-anikotv/builds/plugins.json"
            ]
          }
          EOF

          cat << 'EOF' > README.md
          # AnikoTV CloudStream 3 Extension

          Watch anime from [AnikoTV](https://anikototv.to) directly in CloudStream 3.

          ## Installation

          1. Open CloudStream 3
          2. Go to Settings → Extensions → Repository
          3. Add this repository URL:
             `https://raw.githubusercontent.com/yet66/cloudstream-extensions-anikotv/builds/plugins.json`
          4. Install the AnikoTV extension

          ## Features

          - Search anime
          - Browse trending, new releases, and popular anime
          - View anime details (synopsis, genres, status)
          - Stream episodes with direct video links

          ## Disclaimer

          This extension does not host any content. It only scrapes publicly available information from the source website.

          ## License

          GNU General Public License v3.0
          EOF

          # -------------------------------
          # Module build file
          # -------------------------------
          cat << 'EOF' > AnikoTvProvider/build.gradle.kts
          version = 1

          cloudstream {
              description = "Watch anime from AnikoTV (anikototv.to)"
              authors = listOf("yet66")
              language = "en"
              status = 1
              tvTypes = listOf("Anime")
          }
          EOF

          # -------------------------------
          # Kotlin source files
          # -------------------------------
          cat << 'EOF' > AnikoTvProvider/src/main/kotlin/com/anikotv/AnikoTvPlugin.kt
          package com.anikotv

          import com.lagradost.cloudstream3.plugins.CloudstreamPlugin
          import com.lagradost.cloudstream3.plugins.Plugin
          import com.lagradost.cloudstream3.plugins.PluginInfo

          @CloudstreamPlugin
          class AnikoTvPlugin : Plugin() {
              override fun load() {
                  registerMainAPI(AnikoTvProvider())
              }

              override fun getPluginInfo(): PluginInfo {
                  return PluginInfo(
                      name = "AnikoTV",
                      description = "Watch anime on AnikoTV",
                      version = 1,
                      author = "yet66"
                  )
              }
          }
          EOF

          cat << 'EOF' > AnikoTvProvider/src/main/kotlin/com/anikotv/AnikoTvProvider.kt
          package com.anikotv

          import com.lagradost.cloudstream3.*
          import com.lagradost.cloudstream3.utils.*
          import org.jsoup.nodes.Element

          class AnikoTvProvider : MainAPI() {
              override var name = "AnikoTV"
              override var mainUrl = "https://anikototv.to"
              override var lang = "en"
              override val hasMainPage = true
              override val supportedTypes = setOf(TvType.Anime)

              override val mainPage = mainPageOf(
                  "filter?type=trending" to "Trending Now",
                  "filter?type=recent" to "New Releases",
                  "filter?type=popular" to "Popular Anime"
              )

              override suspend fun getMainPage(page: Int, request: MainPageRequest): HomePageResponse {
                  val document = app.get("$mainUrl/${request.data}").document
                  val home = document.select("div.item").mapNotNull { it.toSearchResult() }
                  return newHomePageResponse(
                      list = HomePageList(
                          name = request.name,
                          list = home,
                          isHorizontalImages = false
                      ),
                      hasNext = false
                  )
              }

              override suspend fun search(query: String): List<SearchResponse>? {
                  val document = app.get("$mainUrl/filter?keyword=${query.replace(" ", "+")}").document
                  return document.select("div.item").mapNotNull { it.toSearchResult() }
              }

              private fun Element.toSearchResult(): SearchResponse? {
                  val title = this.selectFirst(".title a")?.text() ?: return null
                  val href = this.selectFirst(".ani.poster a")?.attr("href")?.let { "$mainUrl$it" }
                  val posterUrl = this.selectFirst(".ani.poster img")?.attr("src")?.let { src ->
                      if (src.startsWith("//")) "https:$src" else src
                  }
                  return newAnimeSearchResponse(title, href ?: "") {
                      this.posterUrl = posterUrl
                  }
              }

              override suspend fun load(url: String): LoadResponse? {
                  val document = app.get(url).document
                  val title = document.selectFirst("h1.anime-title")?.text() ?: return null
                  val posterUrl = document.selectFirst("meta[property='og:image']")?.attr("content")
                  val synopsis = document.selectFirst("div.synopsis")?.text()
                  val genres = document.select("div.genres a").map { it.text() }
                  val tags = document.select("div.tags a").map { it.text() }
                  val statusText = document.selectFirst("div.status span")?.text()
                  val status = when {
                      statusText?.contains("Ongoing", ignoreCase = true) == true -> ShowStatus.Ongoing
                      statusText?.contains("Completed", ignoreCase = true) == true -> ShowStatus.Completed
                      else -> ShowStatus.Unknown
                  }

                  val episodeElements = document.select("div.episodes-list a")
                  val episodes = episodeElements.mapIndexed { index, element ->
                      val episodeUrl = element.attr("href").let { "$mainUrl$it" }
                      val episodeNumber = index + 1
                      val episodeTitle = element.selectFirst(".episode-title")?.text() ?: "Episode $episodeNumber"
                      Episode(
                          data = episodeUrl,
                          name = episodeTitle,
                          season = 1,
                          episode = episodeNumber
                      )
                  }

                  return newAnimeLoadResponse(title, url, TvType.Anime) {
                      this.posterUrl = posterUrl
                      this.plot = synopsis
                      this.genres = genres
                      this.tags = tags
                      this.showStatus = status
                      this.episodes = episodes.reversed()
                  }
              }

              override suspend fun loadLinks(
                  data: String,
                  isCasting: Boolean,
                  subtitleCallback: (SubtitleFile) -> Unit,
                  callback: (ExtractorLink) -> Unit
              ): Boolean {
                  return Extractor().extract(data, callback, subtitleCallback)
              }
          }
          EOF

          cat << 'EOF' > AnikoTvProvider/src/main/kotlin/com/anikotv/Extractor.kt
          package com.anikotv

          import com.lagradost.cloudstream3.app
          import com.lagradost.cloudstream3.utils.ExtractorLink
          import com.lagradost.cloudstream3.utils.ExtractorLinkType
          import com.lagradost.cloudstream3.utils.SubtitleFile
          import org.jsoup.Jsoup

          class Extractor {
              suspend fun extract(
                  url: String,
                  callback: (ExtractorLink) -> Unit,
                  subtitleCallback: (SubtitleFile) -> Unit
              ): Boolean {
                  return try {
                      val document = app.get(url).document
                      val iframeSrc = document.selectFirst("iframe")?.attr("src")
                          ?: document.selectFirst("div.video-player iframe")?.attr("src")
                          ?: return false

                      val iframeDoc = Jsoup.connect(iframeSrc)
                          .userAgent("Mozilla/5.0")
                          .header("Referer", url)
                          .get()

                      var videoUrl: String? = null
                      var quality = "Unknown"

                      val videoSource = iframeDoc.selectFirst("video source")
                      if (videoSource != null) {
                          videoUrl = videoSource.attr("src")
                          quality = videoSource.attr("quality") ?: "Auto"
                      } else {
                          val m3u8Element = iframeDoc.selectFirst("a[href$='.m3u8']")
                          if (m3u8Element != null) {
                              videoUrl = m3u8Element.attr("href")
                              quality = "HLS"
                          } else {
                              val regex = Regex("https?://[^\\s\"']+\\.(mp4|m3u8)")
                              val match = regex.find(iframeDoc.html())
                              videoUrl = match?.value
                          }
                      }

                      if (videoUrl != null) {
                          callback(
                              ExtractorLink(
                                  source = "AnikoTV",
                                  name = "AnikoTV - $quality",
                                  url = videoUrl,
                                  referer = "https://anikototv.to",
                                  quality = quality,
                                  type = if (videoUrl.endsWith(".m3u8")) ExtractorLinkType.M3U8 else ExtractorLinkType.VIDEO
                              )
                          )
                          true
                      } else {
                          false
                      }
                  } catch (e: Exception) {
                      e.printStackTrace()
                      false
                  }
              }
          }
          EOF

          # -------------------------------
          # GitHub Actions workflow files
          # -------------------------------

          cat << 'EOF' > .github/workflows/build.yml
          name: Build

          concurrency:
            group: "build"
            cancel-in-progress: true

          on:
            push:
              branches:
                - master
                - main
              paths-ignore:
                - '*.md'
            workflow_dispatch:

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout source
                  uses: actions/checkout@master
                  with:
                    path: "src"

                - name: Checkout builds branch
                  uses: actions/checkout@master
                  with:
                    ref: "builds"
                    path: "builds"

                - name: Clean old builds
                  run: rm -f $GITHUB_WORKSPACE/builds/*.cs3

                - name: Setup JDK 17
                  uses: actions/setup-java@v1
                  with:
                    java-version: 17

                - name: Setup Android SDK
                  uses: android-actions/setup-android@v2

                - name: Build Plugins
                  run: |
                    cd $GITHUB_WORKSPACE/src
                    chmod +x gradlew
                    ./gradlew make
                    ./gradlew makePluginsJson
                    cp **/build/*.cs3 $GITHUB_WORKSPACE/builds/
                    cp build/plugins.json $GITHUB_WORKSPACE/builds/

                - name: Push to builds branch
                  run: |
                    cd $GITHUB_WORKSPACE/builds
                    git config --local user.email "actions@github.com"
                    git config --local user.name "GitHub Actions"
                    git add .
                    git commit --amend -m "Build $GITHUB_SHA" || exit 0
                    git push --force
          EOF

          echo "All files created successfully."

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate full project structure via workflow"
          branch: main
          file_pattern: "*.gradle.kts *.properties .gitignore *.json *.md .github/workflows/* AnikoTvProvider/**/*"
